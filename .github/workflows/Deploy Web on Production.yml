name: Deploy Web on Production
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  build-and-deploy-web:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # yamllint disable-line
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Verificar que EXPO_TOKEN existe
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error::EXPO_TOKEN no está configurado en los secrets del repositorio"
            exit 1
          fi

      - name: Instalar dependencias
        run: npm ci

      # Recuerda cambiar '14.0.0' por la versión de EAS CLI que uses tú
      - name: Instalar EAS CLI
        run: npm install -g eas-cli@20.5.1

      - name: Verificar autenticación Expo
        run: eas whoami

      - name: Build web assets
        run: npx expo export --platform web

      - name: Deploy to Expo Hosting
        run: npx eas deploy --prod --non-interactive
        env:
          EAS_NO_VCS: '1'
